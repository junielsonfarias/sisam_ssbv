  # ========== SISTEMA ==========

  /health:
    get:
      tags: [Sistema]
      summary: Health check do sistema
      description: |
        Verifica saúde do sistema: banco de dados, JWT, Redis, dispositivos faciais.
        Retorna status 200 se ok ou 500 se algum componente falhar.
      responses:
        '200':
          description: Sistema saudável
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, error]
                  timestamp:
                    type: string
                    format: date-time
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                      jwt:
                        type: string
                  database_latency_ms:
                    type: number
                  database_pool:
                    type: object
                  redis:
                    type: object
                  dispositivos_faciais:
                    type: object
        '500':
          description: Sistema com falhas

  /init:
    get:
      tags: [Sistema]
      summary: Verificar status de inicialização
      description: Retorna se o sistema está inicializado (admin existe).
      responses:
        '200':
          description: Status de inicialização
          content:
            application/json:
              schema:
                type: object
                properties:
                  sistema_inicializado:
                    type: boolean
                  conexao_banco:
                    type: boolean
    post:
      tags: [Sistema]
      summary: Inicializar sistema (criar primeiro admin)
      description: |
        Cria o primeiro administrador do sistema. Protegido: só funciona
        se nenhum admin existir ou se o usuário autenticado for admin.
      responses:
        '200':
          description: Sistema inicializado

  /perfil:
    get:
      tags: [Sistema]
      summary: Buscar perfil do usuário autenticado
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Dados do perfil
    put:
      tags: [Sistema]
      summary: Atualizar perfil
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
      responses:
        '200':
          description: Perfil atualizado

  /perfil/senha:
    put:
      tags: [Sistema]
      summary: Alterar senha
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [senha_atual, nova_senha]
              properties:
                senha_atual:
                  type: string
                nova_senha:
                  type: string
                  minLength: 12
      responses:
        '200':
          description: Senha alterada
        '401':
          description: Senha atual incorreta

  /perfil/email:
    put:
      tags: [Sistema]
      summary: Alterar email
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email alterado

  /perfil/foto:
    post:
      tags: [Sistema]
      summary: Upload de foto de perfil
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                foto:
                  type: string
                  format: binary
      responses:
        '200':
          description: Foto atualizada
    delete:
      tags: [Sistema]
      summary: Remover foto de perfil
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Foto removida

  /personalizacao:
    get:
      tags: [Sistema]
      summary: Buscar personalização do sistema (público)
      responses:
        '200':
          description: Personalização

  /analise/dados:
    get:
      tags: [Sistema]
      summary: Análise de dados para IA
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Dados para análise
