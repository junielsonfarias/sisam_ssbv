    get:
      tags: [Admin/Gestão Escolar]
      summary: Buscar notas escolares
      description: Busca notas de uma turma para disciplina e período específicos.
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/TurmaId'
        - name: disciplina_id
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
        - name: periodo_id
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
        - $ref: '#/components/parameters/EscolaId'
        - name: aluno_id
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Notas escolares
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotaEscolar'
    post:
      tags: [Admin/Gestão Escolar]
      summary: Lançar notas em lote
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotaLote'
      responses:
        '200':
          description: Notas lançadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensagem:
                    type: string
                  total:
                    type: integer

  /admin/notas-escolares/boletim:
    get:
      tags: [Admin/Gestão Escolar]
      summary: Boletim escolar completo de um aluno
      security:
        - cookieAuth: []
      parameters:
        - name: aluno_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Boletim do aluno

  /admin/frequencia:
    get:
      tags: [Admin/Gestão Escolar]
      summary: Buscar frequência bimestral
      description: Retorna frequência de uma turma para um período específico.
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/TurmaId'
        - name: periodo_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - $ref: '#/components/parameters/AnoLetivo'
      responses:
        '200':
          description: Dados de frequência
          content:
            application/json:
              schema:
                type: object
                properties:
                  alunos:
                    type: array
                    items:
                      type: object
                  frequencias:
                    type: object
    post:
      tags: [Admin/Gestão Escolar]
      summary: Salvar frequência bimestral em lote
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [turma_id, periodo_id, frequencias]
              properties:
                turma_id:
                  $ref: '#/components/schemas/UUID'
                periodo_id:
                  $ref: '#/components/schemas/UUID'
                frequencias:
                  type: array
                  items:
                    type: object
                    properties:
                      aluno_id:
                        $ref: '#/components/schemas/UUID'
                      dias_letivos:
                        type: integer
                      presencas:
                        type: integer
                      faltas:
                        type: integer
      responses:
        '200':
          description: Frequência salva

  /admin/frequencia-diaria:
    get:
      tags: [Admin/Gestão Escolar]
      summary: Listar frequência diária
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/EscolaId'
        - $ref: '#/components/parameters/TurmaId'
        - name: data
          in: query
          schema:
            type: string
            format: date
        - name: data_inicio
          in: query
          schema:
            type: string
            format: date
        - name: data_fim
          in: query
          schema:
            type: string
            format: date
        - name: metodo
          in: query
          schema:
            type: string
            enum: [manual, facial, qrcode]
        - name: status
          in: query
          schema:
            type: string
            enum: [presente, ausente]
        - $ref: '#/components/parameters/AnoLetivo'
        - $ref: '#/components/parameters/Pagina'
        - $ref: '#/components/parameters/Limite'
      responses:
        '200':
          description: Frequência diária

  /admin/frequencia-diaria/lancar-faltas:
    post:
      tags: [Admin/Gestão Escolar]
      summary: Lançar faltas em lote
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Faltas lançadas

  /admin/frequencia-diaria/resumo:
    get:
      tags: [Admin/Gestão Escolar]
      summary: Resumo de frequência diária
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/TurmaId'
        - name: data_inicio
          in: query
          schema:
            type: string
        - name: data_fim
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Resumo de frequência

  /admin/frequencia-diaria/agregar:
    post:
      tags: [Admin/Gestão Escolar]
      summary: Agregar frequência diária em bimestral
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                turma_id:
                  $ref: '#/components/schemas/UUID'
                periodo_id:
                  $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Frequência agregada

  /admin/frequencia-hora-aula:
    get:
      tags: [Admin/Gestão Escolar]
      summary: Listar frequência por hora-aula
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/TurmaId'
        - name: data
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Frequência por hora-aula
    post:
      tags: [Admin/Gestão Escolar]
      summary: Registrar frequência por hora-aula
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [turma_id, data, numero_aula, disciplina_id, registros]
              properties:
                turma_id:
                  $ref: '#/components/schemas/UUID'
                data:
                  type: string
                numero_aula:
                  type: integer
                  minimum: 1
                  maximum: 6
                disciplina_id:
                  $ref: '#/components/schemas/UUID'
                registros:
                  type: array
                  items:
                    type: object
                    properties:
                      aluno_id:
                        $ref: '#/components/schemas/UUID'
                      presente:
                        type: boolean
      responses:
        '200':
          description: Frequência registrada

  /admin/frequencia-hora-aula/agregar:
    post:
      tags: [Admin/Gestão Escolar]
      summary: Agregar frequência hora-aula em bimestral
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Frequência agregada

  /admin/infrequencia:
    get:
      tags: [Admin/Gestão Escolar]
      summary: Relatório de infrequência
      security:
        - cookieAuth: []
