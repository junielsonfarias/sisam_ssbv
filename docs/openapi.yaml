  # ========== PÚBLICO ==========

  /boletim:
    get:
      tags: [Público]
      summary: Consultar boletim escolar (público)
      description: |
        Endpoint público para consulta de boletim completo.
        Busca por código do aluno OU cpf + data_nascimento.
        Rate limit: 10 requisições por 15 minutos por IP (proteção LGPD).
        Retorna dados do aluno, disciplinas, notas por período, resultados SISAM e frequência.
      parameters:
        - name: codigo
          in: query
          schema:
            type: string
          description: Código do aluno
        - name: cpf
          in: query
          schema:
            type: string
          description: CPF do aluno (11 dígitos)
        - name: data_nascimento
          in: query
          schema:
            type: string
          description: Data de nascimento (YYYY-MM-DD)
        - name: ano_letivo
          in: query
          schema:
            type: string
          description: Ano letivo (default atual)
      responses:
        '200':
          description: Boletim completo
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Parâmetros insuficientes
        '404':
          description: Aluno não encontrado
        '429':
          $ref: '#/components/responses/429'

  /boletim/frequencia:
