      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serie, nome_serie]
              properties:
                serie:
                  type: string
                nome_serie:
                  type: string
                tipo_ensino:
                  type: string
                  default: anos_iniciais
                qtd_questoes_lp:
                  type: integer
                  default: 0
                qtd_questoes_mat:
                  type: integer
                  default: 0
                qtd_questoes_ch:
                  type: integer
                  default: 0
                qtd_questoes_cn:
                  type: integer
                  default: 0
                tem_producao_textual:
                  type: boolean
                  default: false
                avalia_lp:
                  type: boolean
                  default: true
                avalia_mat:
                  type: boolean
                  default: true
                avalia_ch:
                  type: boolean
                  default: false
                avalia_cn:
                  type: boolean
                  default: false
                usa_nivel_aprendizagem:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Configuração criada

