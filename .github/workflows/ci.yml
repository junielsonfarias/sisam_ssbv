name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  # Variáveis dummy para que next.config.js não bloqueie lint/build no CI
  DB_HOST: ci-placeholder
  DB_NAME: ci-placeholder
  DB_USER: ci-placeholder
  DB_PASSWORD: ci-placeholder
  JWT_SECRET: ci-placeholder-chave-minimo-32-caracteres-segura
  NODE_ENV: development

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc --noEmit

    - name: Run linter
      run: npx next lint --quiet --max-warnings 0 || echo "Lint warnings found (non-blocking)"

    - name: Run tests
      run: npm run test

    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production

    - name: Check build
      run: |
        if [ ! -d ".next" ]; then
          echo "Build failed - .next directory not found"
          exit 1
        fi
